workflows:
  ios-build-check:
    name: Superbrain iOS Build Check
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      xcode: latest
      vars:
        SCHEME: Superbrain

    scripts:
      - name: Install xcodegen
        script: |
          brew install xcodegen

      - name: Generate Xcode project
        script: |
          xcodegen generate

      - name: Resolve SPM packages
        script: |
          xcodebuild -resolvePackageDependencies \
            -scheme "$SCHEME" \
            -project Superbrain.xcodeproj

      - name: Build
        script: |
          xcodebuild build \
            -scheme "$SCHEME" \
            -project Superbrain.xcodeproj \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty

      - name: Run unit tests
        script: |
          xcodebuild test \
            -scheme "$SCHEME" \
            -project Superbrain.xcodeproj \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --report junit --output test-results/results.xml
        test_report: test-results/results.xml

    publishing:
      email:
        recipients:
          - your@email.com
        notify:
          success: true
          failure: true
