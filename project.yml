name: Superbrain
options:
  bundleIdPrefix: com.personal
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
targets:
  Superbrain:
    type: application
    platform: iOS
    sources: [Superbrain]
    settings:
      base:
        SWIFT_VERSION: 5.9
        PRODUCT_BUNDLE_IDENTIFIER: com.personal.superbrain
        MARKETING_VERSION: 1.0.0
        CURRENT_PROJECT_VERSION: 1
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "选择图片附加到笔记"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
    dependencies:
      - package: ZIPFoundation
  SuperbrainTests:
    type: bundle.unit-test
    platform: iOS
    sources: [SuperbrainTests]
    settings:
      base:
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Superbrain.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Superbrain"
        BUNDLE_LOADER: "$(TEST_HOST)"
    dependencies:
      - target: Superbrain
packages:
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation
    from: 0.9.19
